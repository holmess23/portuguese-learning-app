<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Conjugação · Verbos Portugueses</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,700;1,9..144,500&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="brand">
      <div class="brand-tile">
        <svg viewBox="0 0 44 44"><rect width="44" height="44" fill="#2C5F7C"/><path d="M2,22 A20,20 0 0,1 22,2 A20,20 0 0,1 42,22 A20,20 0 0,1 22,42 A20,20 0 0,1 2,22 Z" fill="none" stroke="#C4D9E1" stroke-width="2"/></svg>
      </div>
      <div class="brand-text">
        <h1>Conjugação</h1>
        <p>Verbos portugueses · todos os modos</p>
      </div>
    </div>

    <div class="mode-toggle">
      <button data-mode="cards" class="active">Tarjetas</button>
      <button data-mode="quiz">Test</button>
    </div>

    <div class="overall-progress">
      <div class="stat-row"><span>Dominadas</span><strong id="statKnown">0</strong></div>
      <div class="stat-row"><span>Para repasar</span><strong id="statLearning">0</strong></div>
      <div class="progress-bar"><div class="progress-fill" id="overallFill"></div></div>
    </div>

    <nav class="blocks" id="blockNav"></nav>
  </aside>

  <main class="main">
    <header class="topbar">
      <div class="topbar-left">
        <h2 id="viewTitle">Presente · Indicativo</h2>
        <p id="viewSub">0 dominadas en este bloque</p>
      </div>
      <div class="topbar-actions" id="topbarActions">
        <div class="seg-toggle" id="verbFilterToggle">
          <button data-filter="all" class="active">Todos</button>
          <button data-filter="regular">Regulares</button>
          <button data-filter="irregular">Irregulares</button>
        </div>
        <div class="seg-toggle purple" id="dirToggle">
          <button data-dir="producir" class="active">Producir</button>
          <button data-dir="reconocer">Reconocer</button>
        </div>
        <button id="shuffleBtn">Barajar</button>
        <button id="resetBtn">Reiniciar bloque</button>
      </div>
    </header>

    <section id="cardsView" class="view">
      <div class="card-stage">
        <button class="nav-arrow" id="prevBtn" aria-label="Anterior">‹</button>
        <div class="flashcard" id="flashcard">
          <div class="flashcard-inner" id="flashcardInner">
            <div class="face front">
              <div class="tag-row"><span class="group-tag" id="groupTagFront"></span><span class="tense-tag" id="tenseTagFront"></span></div>
              <span class="lang-label" id="frontLabel">Enunciado</span>
              <div class="word" id="wordFront"></div>
              <span class="person-tag" id="personFront"></span>
              <span class="tap-hint">Toca la tarjeta para ver la conjugación</span>
            </div>
            <div class="face back">
              <div class="tag-row"><span class="group-tag" id="groupTagBack"></span><span class="tense-tag" id="tenseTagBack"></span></div>
              <span class="lang-label" id="backLabel">Forma conjugada</span>
              <div class="word" id="wordBack"></div>
              <span class="person-tag" id="personBack"></span>
            </div>
          </div>
        </div>
        <button class="nav-arrow" id="nextBtn" aria-label="Siguiente">›</button>
      </div>

      <div class="actions">
        <button class="action learning" id="btnLearning">Aún no la sé</button>
        <button class="action known" id="btnKnown">¡La sé!</button>
      </div>
      <p class="kbd-hint">Espacio: voltear · ← →: navegar · 1: aún no la sé · 2: la sé</p>

      <div class="mini-grid" id="miniGrid"></div>
    </section>

    <section id="quizView" class="view" hidden>
      <div class="quiz-card">
        <span class="rank" id="quizRank" style="position:absolute;top:14px;left:18px;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--ink-soft);"></span>
        <span class="lang-label" id="quizPromptLabel">Conjuga</span>
        <div class="quiz-word" id="quizWord"></div>
        <p class="quiz-sub" id="quizSub"></p>
        <div class="quiz-options" id="quizOptions"></div>
        <div class="quiz-type" id="quizTypeArea" style="display:none">
          <input type="text" id="quizInput" class="quiz-input" placeholder="Escribe la forma…" autocomplete="off" autocapitalize="off" spellcheck="false">
          <button id="quizSubmitBtn" class="quiz-submit">Comprobar</button>
          <p class="quiz-feedback" id="quizFeedback"></p>
        </div>
      </div>
      <div class="quiz-footer">
        <p id="quizScore">Aciertos: 0 / 0</p>
        <button id="quizNextBtn" hidden>Siguiente →</button>
      </div>
    </section>
  </main>
</div>

<script src="main.js"></script>
</body>
</html>
